<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumpot Barangay IMS - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="1.png">
    <style>
        .photo-upload-area {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 1.25rem;
        }
        .photo-upload-area:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.04);
        }
        .photo-preview {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            display: block;
            margin: 0 auto 0.75rem;
        }
        .photo-placeholder {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        #photo-input { display: none; }
    </style>
</head>
<body class="animate-fade-in">

    <div class="auth-container" style="max-width: 440px;">
        <div class="card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-weight: 700; color: var(--text-main);">Create Account</h2>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Join our community management system.</p>
            </div>

            <!-- Photo Upload -->
            <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()" id="upload-area">
                <div class="photo-placeholder" id="photo-placeholder">📷</div>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Click to upload profile photo</p>
                <input type="file" id="photo-input" accept="image/*" onchange="previewPhoto(event)">
            </div>

            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input id="fullname" type="text" placeholder="Uzumaki Naruto" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="purok">Purok / Area</label>
                <select id="purok">
                    <option value="Purok 1">Purok 1</option>
                    <option value="Purok 2">Purok 2</option>
                    <option value="Purok 3">Purok 3</option>
                    <option value="Purok 4">Purok 4</option>
                    <option value="Purok 5">Purok 5</option>
                    <option value="Purok 6">Purok 6</option>
                    <option value="Purok 7">Purok 7</option>
                    <option value="Purok 8">Purok 8</option>
                    <option value="Purok 9">Purok 9</option>
                </select>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input id="phone" type="tel" placeholder="09123456789" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Cyberxel" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Strong & Unforgettable Password" autocomplete="new-password">
            </div>

            <button class="btn btn-primary" id="saveBtn" onclick="save()">
                Register Account
            </button>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
                <span style="color: var(--text-muted);">Already have an account?</span>
                <a href="index.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.25rem;">Back to Login</a>
            </div>
        </div>
        <footer style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem; padding-bottom: 2rem;">
            Developed by Cyberxel
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="api.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        let photoBase64 = "";

        function previewPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                photoBase64 = e.target.result;
                const area = document.getElementById('upload-area');
                area.innerHTML = `
                    <img src="${photoBase64}" class="photo-preview" alt="Profile Photo">
                    <p style="color: var(--primary); font-size: 0.85rem; font-weight: 600;">Photo selected ✓</p>
                    <p style="color: var(--text-muted); font-size: 0.75rem;">Click to change</p>
                    <input type="file" id="photo-input" accept="image/*" onchange="previewPhoto(event)" style="display:none;">
                `;
                area.onclick = () => document.getElementById('photo-input').click();
            };
            reader.readAsDataURL(file);
        }

        async function save() {
            const saveBtn = document.getElementById("saveBtn");
            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            const name = document.getElementById("fullname").value.trim();
            const purok = document.getElementById("purok").value;
            const phone = document.getElementById("phone").value.trim();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!name || !username || !password || !phone || !photoBase64) {
                alert("Please fill up all fields and upload a profile photo.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Register Account";
                return;
            }

            const users = await apiGet("users");

            const nameExists = users.find(x => x.name.toLowerCase() === name.toLowerCase());
            const userExists = users.find(x => x.username.toLowerCase() === username.toLowerCase());

            if (nameExists || userExists) {
                alert(nameExists ? "This full name is already registered." : "This username is already taken.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Register Account";
                return;
            }

            users.push({
                username: username,
                password: password,
                name: name,
                purok: purok,
                phone: phone,
                photo: photoBase64,
                createdAt: new Date().toISOString()
            });

            const res = await apiPost("users", users);
            
            if (res.success) {
                alert("Account created successfully!");
                location.href = "index.html";
            } else {
                alert("Error connecting to server. Please ensure the server is running.");
                saveBtn.disabled = false;
                saveBtn.innerText = "Register Account";
            }
        }
    </script>
</body>
</html>
