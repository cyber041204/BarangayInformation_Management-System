<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Sumpot IMS - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="1.png">
</head>
<body class="animate-fade-in">

    <div class="auth-container">
        <div class="card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="1.png" alt="Logo" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 3px solid var(--primary);">
                <h2 style="font-weight: 700; color: var(--text-main);">Barangay Sumpot IMS</h2>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Welcome back! Please login to your account.</p>
            </div>

            <div class="input-group">
                <label for="role">Login As</label>
                <select id="role">
                    <option value="resident">Resident</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <div class="input-group">
                <label for="user">Username</label>
                <input id="user" type="text" placeholder="Enter your username" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="pass">Password</label>
                <input id="pass" type="password" placeholder="••••••••" autocomplete="new-password">
            </div>

            <button class="btn btn-primary" id="loginBtn" onclick="login()">
                Sign In
            </button>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
                <span style="color: var(--text-muted);">Don't have an account?</span>
                <a href="register.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.25rem;">Create Account</a>
            </div>

            <div style="margin-top: 1rem;">
                <button class="btn btn-outline" style="color: var(--danger); border-color: transparent;" onclick="exitApp()">
                    Exit Application
                </button>
            </div>
        </div>
        <footer style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem;">
            Developed by Cyberxel
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="api.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Failed', err));
            });
        }

        async function login() {
            const role = document.getElementById("role").value;
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();

            if (!u || !p) {
                alert("Please enter both username and password.");
                return;
            }

            const loginBtn = document.getElementById("loginBtn");
            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying...";

            if (role === "admin") {
                const _a = atob("YWRtaW4="), _b = atob("YmFyYW5nYXlzdW1wb3QxMjM0NQ==");
                if (u === _a && p === _b) {
                    localStorage.setItem("role", "admin");
                    localStorage.removeItem("currentUser");
                    location.href = "admin.html";
                } else {
                    alert("Invalid Admin Credentials");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Sign In";
                }
                return;
            }

            const users = await apiGet("users");
            const found = users.find(x => x.username === u && x.password === p);

            if (found) {
                const safeUser = {
                    username: found.username,
                    name: found.name || "Resident",
                    purok: found.purok || "N/A"
                };

                localStorage.setItem("currentUser", JSON.stringify(safeUser));
                localStorage.setItem("role", "resident");
                location.href = "resident.html";
            } else {
                alert("Invalid Resident Credentials");
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign In";
            }
        }

        function exitApp() {
            if (confirm("Are you sure you want to exit?")) {
                window.close();
                location.href = "about:blank";
            }
        }

        window.onload = () => {
            const role = localStorage.getItem("role");
            if (role === "admin") location.href = "admin.html";
            else if (role === "resident") location.href = "resident.html";
        };
    </script>
</body>
</html>
